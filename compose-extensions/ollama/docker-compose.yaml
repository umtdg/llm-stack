services:
  ollama:
    image: ollama/ollama:${OLLAMA_DOCKER_TAG:-latest}
    restart: unless-stopped
    pull_policy: always
    tty: true
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 5s
    ports:
      - ${OLLAMA_WEBAPI_PORT-11434}:11434
    volumes:
      - ${OLLAMA_DATA_DIR:-.data/ollama}:/root/.ollama
    ulimits:
      nofile:
        soft: 20000
        hard: 40000

  open-webui:
    depends_on:
      ollama:
        condition: service_healthy
