services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG:-main}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - "OLLAMA_BASE_URL=http://ollama:11434"
      - "WEBUI_SECRET_KEY="
    ports:
      - ${WEBUI_PORT:-3000}:8080
    volumes:
      - ${WEBUI_DATA_DIR:-.data/open-webui}:/app/backend/data
    extra_hosts:
      - host.docker.internal:host-gateway
    ulimits:
      # increase these if embeddings fail with too many open files
      # OR
      # set concurrent connection limit under Admin Panel > Settings > Documents
      nofile:
        soft: 8192
        hard: 65535

volumes:
  ollama: {}
  open-webui: {}
